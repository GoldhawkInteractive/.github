name: Manual Release

on:
  workflow_call:
    inputs:
      commit:
        description: "Commit SHA to release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout target commit
        run: |
          git fetch origin
          git checkout ${{ inputs.commit }}

      - name: Determine release version
        id: release
        run: |
          node <<'NODE'
          const fs = require('fs');

          const pkgPath = 'package.json';

          if (!fs.existsSync(pkgPath)) {
            throw new Error('package.json not found.');
          }

          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const version = pkg && typeof pkg.version === 'string' ? pkg.version.trim() : '';

          if (!version) {
            throw new Error('package.json does not contain a valid version.');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `name=${version}\n`);
          NODE

      - name: Create release branch
        env:
          RELEASE_NAME: ${{ steps.release.outputs.name }}
        run: |
          git checkout -b "release-${RELEASE_NAME}"
          git push origin "release-${RELEASE_NAME}"

      - name: Random jitter to reduce Trello race conditions
        run: sleep $((RANDOM % 11))
      - name: Find Trello card
        id: trello
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          VERSION: ${{ steps.release.outputs.name }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const { TRELLO_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID, VERSION } = process.env;

          if (!TRELLO_KEY || !TRELLO_TOKEN || !TRELLO_BOARD_ID) {
            throw new Error('Missing Trello configuration (TRELLO_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID).');
          }

          const cardName = `Merge Back Release Branches (${VERSION})`;
          const cardsUrl = new URL(`https://api.trello.com/1/boards/${TRELLO_BOARD_ID}/cards/open`);
          cardsUrl.searchParams.set('key', TRELLO_KEY);
          cardsUrl.searchParams.set('token', TRELLO_TOKEN);
          cardsUrl.searchParams.set('fields', 'id,name,idList,idShort');

          const appendOutput = (card) => {
            if (!card || typeof card.idShort === 'undefined') {
              throw new Error('Unable to determine Trello card idShort.');
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `card-id=${card.idShort}\n`);
          };

          const trelloFetch = async (input, init) => {
            const response = await fetch(input, init);
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Trello request failed: ${response.status} ${text}`);
            }
            return response;
          };

          (async () => {
            const listsUrl = new URL(`https://api.trello.com/1/boards/${TRELLO_BOARD_ID}/lists`);
            listsUrl.searchParams.set('key', TRELLO_KEY);
            listsUrl.searchParams.set('token', TRELLO_TOKEN);
            listsUrl.searchParams.set('filter', 'open');

            const listsResponse = await trelloFetch(listsUrl);
            const lists = await listsResponse.json();
            const completeListPrefix = `Complete (${VERSION})`;
            const completeLists = lists.filter(list => list && !list.closed && typeof list.name === 'string' && list.name.startsWith(completeListPrefix));
            const openLists = lists.filter(list => list && !list.closed);
            const targetList = completeLists[0] || openLists[0];

            if (!targetList) {
              throw new Error(`Unable to locate an open list on board ${TRELLO_BOARD_ID} to create card "${cardName}".`);
            }

            const cardsResponse = await trelloFetch(cardsUrl);
            const cards = await cardsResponse.json();
            const validListIds = completeLists.length ? new Set(completeLists.map(list => list.id)) : new Set();
            const match = cards.find(card => {
              if (!card || card.name !== cardName) {
                return false;
              }
              return validListIds.size === 0 || validListIds.has(card.idList);
            });

            if (match) {
              appendOutput(match);
              return;
            }

            const createUrl = new URL('https://api.trello.com/1/cards');
            createUrl.searchParams.set('key', TRELLO_KEY);
            createUrl.searchParams.set('token', TRELLO_TOKEN);
            createUrl.searchParams.set('idList', targetList.id);
            createUrl.searchParams.set('name', cardName);
            createUrl.searchParams.set('pos', 'top');

            const createResponse = await trelloFetch(createUrl, { method: 'POST' });
            const createdCard = await createResponse.json();

            // Wait for other concurrent runners to finish their creates, then dedup
            await new Promise(resolve => setTimeout(resolve, 5000));

            const recheckResponse = await trelloFetch(cardsUrl);
            const allCards = await recheckResponse.json();
            const duplicates = allCards
              .filter(card => card && card.name === cardName)
              .sort((a, b) => a.id.localeCompare(b.id));

            if (duplicates.length > 1) {
              const winner = duplicates[0];
              for (const dup of duplicates.slice(1)) {
                const archiveUrl = new URL(`https://api.trello.com/1/cards/${dup.id}`);
                archiveUrl.searchParams.set('key', TRELLO_KEY);
                archiveUrl.searchParams.set('token', TRELLO_TOKEN);
                archiveUrl.searchParams.set('closed', 'true');
                await trelloFetch(archiveUrl, { method: 'PUT' });
                console.log(`Archived duplicate card "${dup.name}" (#${dup.idShort})`);
              }
              appendOutput(winner);
            } else if (duplicates.length === 1) {
              // Another runner already archived our card; use the surviving one
              appendOutput(duplicates[0]);
            } else {
              appendOutput(createdCard);
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Tag release
        env:
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          TRELLO_CARD_ID: ${{ steps.trello.outputs.card-id }}
        run: |
          git tag -a "v${RELEASE_NAME}" -m "Finish v${RELEASE_NAME} {#close ${TRELLO_CARD_ID} ${RELEASE_NAME}}"
          git push origin "v${RELEASE_NAME}"

      - name: Merge release into downstream branches
        env:
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          TRELLO_CARD_ID: ${{ steps.trello.outputs.card-id }}
        run: |
          cat > "${RUNNER_TEMP}/resolve-version-conflicts.js" <<'NODE'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          const KNOWN = {
            'versioning.json': { type: 'json', key: 'VERSION' },
            'package.json': { type: 'json', key: 'version' },
            'ProjectSettings/ProjectSettings.asset': { type: 'unity' },
          };

          const compareVersions = (a, b) => {
            const pa = String(a).split('.').map(n => parseInt(n, 10) || 0);
            const pb = String(b).split('.').map(n => parseInt(n, 10) || 0);
            const len = Math.max(pa.length, pb.length);
            for (let i = 0; i < len; i++) {
              const av = pa[i] || 0;
              const bv = pb[i] || 0;
              if (av !== bv) return av - bv;
            }
            return 0;
          };

          const stageContent = (stage, file) =>
            execSync(`git show :${stage}:${file}`, { encoding: 'utf8' });

          const extractVersion = (content, info) => {
            if (info.type === 'json') {
              const value = JSON.parse(content)[info.key];
              if (typeof value !== 'string') {
                throw new Error(`${info.key} missing or not a string`);
              }
              return value.trim();
            }
            const m = content.match(/^\s*bundleVersion:\s*(\S+)\s*$/m);
            if (!m) throw new Error('bundleVersion not found');
            return m[1];
          };

          const conflicted = execSync('git diff --name-only --diff-filter=U', { encoding: 'utf8' })
            .split('\n').map(s => s.trim()).filter(Boolean);

          if (conflicted.length === 0) process.exit(0);

          const unsupported = conflicted.filter(f => !KNOWN[f]);
          if (unsupported.length > 0) {
            console.error('Cannot auto-resolve conflicts in:\n  ' + unsupported.join('\n  '));
            process.exit(1);
          }

          for (const file of conflicted) {
            const info = KNOWN[file];
            const ours = stageContent(2, file);
            const theirs = stageContent(3, file);
            const ourVer = extractVersion(ours, info);
            const theirVer = extractVersion(theirs, info);
            const useTheirs = compareVersions(theirVer, ourVer) > 0;
            const side = useTheirs ? '--theirs' : '--ours';
            const winnerVer = useTheirs ? theirVer : ourVer;
            console.log(`${file}: ours=${ourVer} theirs=${theirVer} -> ${side} (${winnerVer})`);
            execSync(`git checkout ${side} -- "${file}"`);
            execSync(`git add -- "${file}"`);
          }

          const { RELEASE_NAME, TRELLO_CARD_ID, RUNNER_TEMP } = process.env;
          const header = `Finish v${RELEASE_NAME} {#close ${TRELLO_CARD_ID} ${RELEASE_NAME}}`;
          const conflictsBlock = '# Conflicts:\n' + conflicted.map(f => `#    ${f}`).join('\n');
          const message = `${header}\n\n${conflictsBlock}\n`;
          const msgFile = path.join(RUNNER_TEMP, 'merge-commit-msg.txt');
          fs.writeFileSync(msgFile, message);
          execSync(`git commit --cleanup=verbatim -F "${msgFile}"`, { stdio: 'inherit' });
          NODE

          node <<'NODE'
          const { execFileSync, spawnSync } = require('child_process');
          const fs = require('fs');

          const { RELEASE_NAME, TRELLO_CARD_ID, RUNNER_TEMP } = process.env;
          const currentBranch = `release-${RELEASE_NAME}`;
          const mergeMessage = `Finish v${RELEASE_NAME} {#close ${TRELLO_CARD_ID} ${RELEASE_NAME}}`;

          const git = (...args) => spawnSync('git', args, { stdio: 'inherit' });
          const gitOut = (...args) => execFileSync('git', args, { encoding: 'utf8' });

          const parseSegments = name => {
            const m = name.match(/^release-(\d+|[xy])\.(\d+|[xy])\.(\d+|[xy])$/);
            return m ? [m[1], m[2], m[3]] : null;
          };

          const currentSegs = parseSegments(currentBranch);
          if (!currentSegs || currentSegs.some(s => !/^\d+$/.test(s))) {
            console.error(`Current release branch ${currentBranch} must have numeric segments.`);
            process.exit(1);
          }
          const cur = currentSegs.map(Number);

          const isMergeTarget = name => {
            if (name === currentBranch) return false;
            const segs = parseSegments(name);
            if (!segs) return false;
            for (let i = 0; i < 3; i++) {
              const seg = segs[i];
              if (seg === 'x' || seg === 'y') {
                // wildcard at major or minor -> ancestor (merge); at patch with prior numeric matches -> immediate parent (skip)
                return i < 2;
              }
              const n = Number(seg);
              if (n > cur[i]) return true;
              if (n < cur[i]) return false;
            }
            return false;
          };

          const sortKey = name =>
            parseSegments(name).map(s => /^\d+$/.test(s) ? Number(s) : Number.MAX_SAFE_INTEGER);

          const remoteBranches = gitOut('ls-remote', '--heads', 'origin', 'refs/heads/release-*')
            .split('\n')
            .map(line => {
              const m = line.match(/refs\/heads\/(.+)$/);
              return m ? m[1] : null;
            })
            .filter(Boolean);

          const releaseTargets = remoteBranches.filter(isMergeTarget).sort((a, b) => {
            const ka = sortKey(a);
            const kb = sortKey(b);
            for (let i = 0; i < 3; i++) {
              if (ka[i] !== kb[i]) return ka[i] - kb[i];
            }
            return 0;
          });

          const targets = ['development', 'master', ...releaseTargets];
          console.log(`Merge targets: ${targets.join(', ')}`);
          if (releaseTargets.length === 0) {
            console.log('No higher release branches to merge into.');
          }

          const failures = [];
          const successes = [];

          for (const target of targets) {
            console.log(`\n=== Merging ${currentBranch} into ${target} ===`);
            try {
              if (git('checkout', target).status !== 0) {
                failures.push({ target, reason: 'checkout failed' });
                continue;
              }

              const merge = git('merge', '--no-ff', '-m', mergeMessage, currentBranch);
              if (merge.status !== 0) {
                if (!fs.existsSync('.git/MERGE_HEAD')) {
                  console.log(`Merge into ${target} failed without entering conflict state.`);
                  failures.push({ target, reason: 'merge failed' });
                  continue;
                }
                console.log(`Conflict in ${target}; attempting auto-resolution for known version files...`);
                const resolve = spawnSync('node', [`${RUNNER_TEMP}/resolve-version-conflicts.js`], { stdio: 'inherit' });
                if (resolve.status !== 0) {
                  console.log(`Cannot auto-resolve conflicts in ${target}; aborting merge.`);
                  git('merge', '--abort');
                  failures.push({ target, reason: 'unresolvable conflict' });
                  continue;
                }
              }

              if (git('push', 'origin', target).status !== 0) {
                failures.push({ target, reason: 'push failed' });
                continue;
              }

              successes.push(target);
            } catch (err) {
              console.error(`Unexpected error processing ${target}: ${err && err.message}`);
              if (fs.existsSync('.git/MERGE_HEAD')) git('merge', '--abort');
              failures.push({ target, reason: 'unexpected error' });
            }
          }

          console.log('\n=== Merge Summary ===');
          console.log(`Succeeded (${successes.length}): ${successes.join(', ') || '(none)'}`);
          if (failures.length > 0) {
            const detail = failures.map(f => `${f.target} (${f.reason})`).join(', ');
            console.log(`Failed (${failures.length}): ${detail}`);
            const failedNames = failures.map(f => f.target).join(', ');
            console.log(`::error::Failed to merge ${currentBranch} into: ${failedNames}. Release branch will be preserved for manual resolution.`);
            process.exit(1);
          }
          NODE

      - name: Delete release branch
        env:
          RELEASE_NAME: ${{ steps.release.outputs.name }}
        run: |
          git push origin --delete "release-${RELEASE_NAME}"
          git branch -D "release-${RELEASE_NAME}"
